services:
  postgres:
    image: postgres:16-alpine
    container_name: qsl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qsl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qsl_password}
      POSTGRES_DB: ${POSTGRES_DB:-qsl_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qsl_user} -d ${POSTGRES_DB:-qsl_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
